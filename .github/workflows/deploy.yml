name: Deploy to Cloudflare Pages

# Builds public/config.js from GitHub Variables/Secrets (config.js is git-ignored,
# so it never exists in the repo) and deploys the static public/ folder to Cloudflare Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # clientId / tenantId / redirectUri are public identifiers (they ship in
      # client-side JS), so they come from repository *Variables*, not Secrets.
      - name: Generate public/config.js
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          REDIRECT_URI: ${{ vars.REDIRECT_URI }}
        run: |
          set -euo pipefail
          : "${AZURE_CLIENT_ID:?Set repository Variable AZURE_CLIENT_ID}"
          : "${AZURE_TENANT_ID:?Set repository Variable AZURE_TENANT_ID}"
          : "${REDIRECT_URI:?Set repository Variable REDIRECT_URI}"
          # Use Node's JSON.stringify so values are always safely escaped.
          node -e '
            const fs = require("fs");
            const cfg = {
              clientId: process.env.AZURE_CLIENT_ID,
              tenantId: process.env.AZURE_TENANT_ID,
              redirectUri: process.env.REDIRECT_URI,
            };
            fs.writeFileSync(
              "public/config.js",
              "window.__APP_CONFIG__ = " + JSON.stringify(cfg, null, 2) + ";\n"
            );
          '
          echo "Generated public/config.js:"
          cat public/config.js

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          project_name="${CLOUDFLARE_PAGES_PROJECT_NAME:-${GITHUB_REPOSITORY#*/}}"
          deploy_log="$(mktemp)"

          set +e
          npx --yes wrangler@3.90.0 pages deploy public \
            --project-name="${project_name}" \
            --branch="${GITHUB_REF_NAME}" 2>&1 | tee "${deploy_log}"
          deploy_status=${PIPESTATUS[0]}
          set -e

          if [ "${deploy_status}" -eq 0 ]; then
            exit 0
          fi

          # Retry only for the specific Cloudflare Pages bootstrap case seen in CI.
          if grep -Fq "Project not found" "${deploy_log}"; then
            npx --yes wrangler@3.90.0 pages project create "${project_name}" --production-branch=main
            npx --yes wrangler@3.90.0 pages deploy public \
              --project-name="${project_name}" \
              --branch="${GITHUB_REF_NAME}"
            exit 0
          fi

          exit "${deploy_status}"
